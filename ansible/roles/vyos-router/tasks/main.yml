---
# ----------------------------------------
# NAT / MASQUERADE
# ----------------------------------------
- name: Configure NAT masquerade for all VLANs
  vyos.vyos.vyos_config:
    lines:
      - set nat source rule 100 outbound-interface name eth0
      - set nat source rule 100 source address 10.0.0.0/8
      - set nat source rule 100 translation address masquerade
      - set nat source rule 100 description 'Masquerade all VLAN traffic to WAN'
    save: true

# ----------------------------------------
# VLAN TRUNK - remove IP from parent interface
# if manually assigned during bootstrap
# ----------------------------------------
- name: Ensure eth1 has no IP address (trunk interface only)
  vyos.vyos.vyos_config:
    lines:
      - delete interfaces ethernet eth1 address
    save: true

# ----------------------------------------
# VLAN SUB-INTERFACES
# ----------------------------------------
- name: Configure VLAN10 - Management (10.10.0.0/24)
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet eth1 vif 10 address 10.10.0.1/24
      - set interfaces ethernet eth1 vif 10 description Management
    save: true

- name: Configure VLAN20 - WordPress (10.20.0.0/24)
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet eth1 vif 20 address 10.20.0.1/24
      - set interfaces ethernet eth1 vif 20 description WordPress
    save: true

- name: Configure VLAN30 - Apps (10.30.0.0/24)
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet eth1 vif 30 address 10.30.0.1/24
      - set interfaces ethernet eth1 vif 30 description Apps
    save: true

- name: Configure VLAN40 - Vaultwarden (10.40.0.0/24)
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet eth1 vif 40 address 10.40.0.1/24
      - set interfaces ethernet eth1 vif 40 description Vaultwarden
    save: true
# ----------------------------------------
# FIREWALL RULES
# ----------------------------------------
- name: Allow established/related connections
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 5 action accept
      - set firewall ipv4 forward filter rule 5 state established
      - set firewall ipv4 forward filter rule 5 state related
      - set firewall ipv4 forward filter rule 5 description 'Allow established/related connections'
    save: true

- name: Allow ISP to internal networks
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 10 action accept
      - set firewall ipv4 forward filter rule 10 source address 192.168.1.0/24
      - set firewall ipv4 forward filter rule 10 destination address 10.0.0.0/8
    save: true

- name: Allow internal networks to ISP
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 20 action accept
      - set firewall ipv4 forward filter rule 20 source address 10.0.0.0/8
      - set firewall ipv4 forward filter rule 20 destination address 192.168.1.0/24
    save: true

- name: Allow Traefik to reach WordPress LXCs
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 25 action accept
      - set firewall ipv4 forward filter rule 25 source address 10.10.0.11
      - set firewall ipv4 forward filter rule 25 destination address 10.20.0.0/24
      - set firewall ipv4 forward filter rule 25 description 'Allow Traefik to reach WordPress LXCs'
    save: true

- name: Block WordPress LXCs from reaching management network
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 30 action drop
      - set firewall ipv4 forward filter rule 30 source address 10.20.0.0/24
      - set firewall ipv4 forward filter rule 30 destination address 10.10.0.0/24
      - set firewall ipv4 forward filter rule 30 description 'Block WordPress to Management'
    save: true
